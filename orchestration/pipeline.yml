id: sport_data_pipeline
namespace: sport.data

description: "Pipeline POC Avantages Sportifs - Sport Data Solution"

tasks:
  - id: pipeline
    type: io.kestra.plugin.core.flow.WorkingDirectory
    tasks:
      - id: clone_repo
        type: io.kestra.plugin.git.Clone
        url: https://github.com/TabBah1/sport_data_poc.git
        branch: main

      - id: ingestion
        type: io.kestra.plugin.scripts.python.Commands
        taskRunner:
          type: io.kestra.plugin.core.runner.Process
        beforeCommands:
          - mkdir -p data/raw
          - cp "/app/project/data/raw/Donnees RH.xlsx" "data/raw/Donnees RH.xlsx"
          - cp "/app/project/data/raw/Donnees Sportive.xlsx" "data/raw/Donnees Sportive.xlsx"
          - pip install --quiet --cache-dir /app/project/.pip-cache pandas openpyxl sqlalchemy psycopg2-binary python-dotenv
        env:
          DATABASE_URL: "{{ secret('DATABASE_URL') }}"
        commands:
          - python src/ingestion/load_data.py

      - id: simulation
        type: io.kestra.plugin.scripts.python.Commands
        taskRunner:
          type: io.kestra.plugin.core.runner.Process
        beforeCommands:
          - pip install --quiet --cache-dir /app/project/.pip-cache pandas sqlalchemy psycopg2-binary python-dotenv faker
        env:
          DATABASE_URL: "{{ secret('DATABASE_URL') }}"
        commands:
          - python src/simulation/strava_gen.py

      - id: validation_gmaps
        type: io.kestra.plugin.scripts.python.Commands
        taskRunner:
          type: io.kestra.plugin.core.runner.Process
        beforeCommands:
          - pip install --quiet --cache-dir /app/project/.pip-cache sqlalchemy psycopg2-binary python-dotenv requests
        env:
          DATABASE_URL: "{{ secret('DATABASE_URL') }}"
          GOOGLE_MAPS_API_KEY: "{{ secret('GOOGLE_MAPS_API_KEY') }}"
        commands:
          - python src/validation/gmaps_check.py

      - id: calcul_avantages
        type: io.kestra.plugin.scripts.python.Commands
        taskRunner:
          type: io.kestra.plugin.core.runner.Process
        beforeCommands:
          - pip install --quiet --cache-dir /app/project/.pip-cache sqlalchemy psycopg2-binary python-dotenv
        env:
          DATABASE_URL: "{{ secret('DATABASE_URL') }}"
          BONUS_RATE: "{{ secret('BONUS_RATE') }}"
          WELLNESS_MIN_ACTIVITIES: "{{ secret('WELLNESS_MIN_ACTIVITIES') }}"
          WELLNESS_DAYS: "{{ secret('WELLNESS_DAYS') }}"
        commands:
          - python src/eligibility/compute.py

      - id: qualite_donnees
        type: io.kestra.plugin.scripts.python.Commands
        taskRunner:
          type: io.kestra.plugin.core.runner.Process
        beforeCommands:
          - pip install --quiet --cache-dir /app/project/.pip-cache pandas sqlalchemy psycopg2-binary python-dotenv great-expectations
        env:
          DATABASE_URL: "{{ secret('DATABASE_URL') }}"
        commands:
          - python src/quality/expectations.py

      - id: streaming_producer
        type: io.kestra.plugin.scripts.python.Commands
        taskRunner:
          type: io.kestra.plugin.core.runner.Process
        beforeCommands:
          - pip install --quiet --cache-dir /app/project/.pip-cache sqlalchemy psycopg2-binary python-dotenv kafka-python
        env:
          DATABASE_URL: "{{ secret('DATABASE_URL') }}"
          KAFKA_BROKER: redpanda:9092
        commands:
          - python src/notifications/producer.py

triggers:
  - id: schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 8 * * 1"
    description: "Execution automatique chaque lundi a 8h"
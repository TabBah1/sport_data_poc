services:
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 5

  kestra:
    image: kestra/kestra:latest
    container_name: kestra
    pull_policy: always
    user: "root"
    command: server standalone
    volumes:
      - kestra-data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/app/project
    environment:
      # Générer ces valeurs avec : python generate_secrets.py
      # Les valeurs sont vos variables .env encodées en base64
      SECRET_DATABASE_URL: VOTRE_DATABASE_URL_EN_BASE64
      SECRET_GOOGLE_MAPS_API_KEY: VOTRE_GOOGLE_MAPS_KEY_EN_BASE64
      SECRET_SLACK_BOT_TOKEN: VOTRE_SLACK_TOKEN_EN_BASE64
      SECRET_SLACK_CHANNEL: VOTRE_SLACK_CHANNEL_EN_BASE64
      SECRET_BONUS_RATE: MC4wNQ==
      SECRET_WELLNESS_MIN_ACTIVITIES: MTU=
      SECRET_WELLNESS_DAYS: NQ==
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://host.docker.internal:5432/kestra
            driverClassName: org.postgresql.Driver
            username: postgres
            password: VOTRE_MOT_DE_PASSE_POSTGRES
        kestra:
          server:
            basic-auth:
              enabled: false
          repository:
            type: postgres
          storage:
            type: local
            local:
              base-path: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmp-dir:
              path: /tmp/kestra-wd/tmp
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      redpanda:
        condition: service_healthy

volumes:
  kestra-data: